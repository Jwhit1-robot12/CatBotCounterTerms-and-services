<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Exo+2:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a0f;--bg2:#0c0f18;--bg3:#111520;--bg4:#161c2c;
  --border:rgba(168,124,255,0.12);--border2:rgba(168,124,255,0.28);
  --accent:#a87cff;--accent2:#8b5cf6;--accent3:#c4b0ff;
  --gold:#f0c040;--gold2:#ffd966;--goldbg:rgba(240,192,64,0.12);
  --red:#ff6b6b;--redbg:rgba(255,107,107,0.12);
  --green:#4ade80;--greenbg:rgba(74,222,128,0.12);
  --blue:#60a5fa;--bluebg:rgba(96,165,250,0.12);
  --orange:#fb923c;--orangebg:rgba(251,146,60,0.12);
  --text:#e8e4f0;--text2:#a89cc0;--text3:#5a5470;
  --fh:'Cinzel',serif;--fb:'Exo 2',sans-serif;--fm:'Share Tech Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:13px;line-height:1.5;min-height:100vh}

.title{font-family:var(--fh);font-weight:700;font-size:30px;;color:var(--accent);text-align:center;margin:20px 0}
.content{font-family:var(--fh);font-weight:700;font-size:19px;color:var(--accent);text-align:center;margin:20px 0}
</style>
</head>
<body>
<div class="title">Terms and Conditions</div>
<div class="content">Be Chill</div>
</body>
</html>
